name: Seed Coordinator

on:
  workflow_dispatch:
    inputs:
      coordinator_email:
        description: "Coordinator email (optional, overrides secret)"
        required: false
      coordinator_password:
        description: "Coordinator password (optional, overrides secret)"
        required: false

jobs:
  seed-coordinator:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: college-placement-portal/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: college-placement-portal/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: college-placement-portal/backend
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Verify revision and seed file encoding
        working-directory: college-placement-portal/backend
        run: |
          git rev-parse HEAD
          python - <<'PY'
          from pathlib import Path
          p = Path("scripts/seed_coordinator.ts")
          b = p.read_bytes()
          if b"\x00" in b:
              raise SystemExit("seed_coordinator.ts contains null bytes (invalid UTF-16-like encoding)")
          print("seed_coordinator.ts encoding guard: OK")
          PY

      - name: Seed coordinator account
        working-directory: college-placement-portal/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_COORDINATOR_EMAIL: ${{ secrets.COORDINATOR_EMAIL }}
          SECRET_COORDINATOR_PASSWORD: ${{ secrets.COORDINATOR_PASSWORD }}
          INPUT_COORDINATOR_EMAIL: ${{ github.event.inputs.coordinator_email }}
          INPUT_COORDINATOR_PASSWORD: ${{ github.event.inputs.coordinator_password }}
        run: |
          if [ -n "$INPUT_COORDINATOR_EMAIL" ]; then
            export COORDINATOR_EMAIL="$INPUT_COORDINATOR_EMAIL"
          else
            export COORDINATOR_EMAIL="$SECRET_COORDINATOR_EMAIL"
          fi

          if [ -n "$INPUT_COORDINATOR_PASSWORD" ]; then
            export COORDINATOR_PASSWORD="$INPUT_COORDINATOR_PASSWORD"
          else
            export COORDINATOR_PASSWORD="$SECRET_COORDINATOR_PASSWORD"
          fi

          npm run seed:coordinator
